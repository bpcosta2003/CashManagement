<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fundo do baú (tile) -->
  <rect width="64" height="64" rx="14" fill="#efe5cf"/>

  <!-- Papel R$ -->
  <rect x="11" y="14" width="11" height="15" rx="1.2" fill="#fffdfc"/>
  <rect x="13" y="17.5" width="7" height="0.9" fill="rgba(46,38,35,0.18)"/>
  <text x="16.5" y="25" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="5.2" font-weight="700" fill="#5a2e3f">R$</text>

  <!-- Bar chart -->
  <rect x="28" y="24" width="3.5" height="6" rx="0.6" fill="#6f4e2e"/>
  <rect x="33" y="20" width="3.5" height="10" rx="0.6" fill="#b89a63"/>
  <rect x="38" y="15" width="3.5" height="15" rx="0.6" fill="#5a2e3f"/>

  <!-- Seta -->
  <g stroke="#5a2e3f" stroke-width="1.8"
     stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M43 21 L48 16 L52 19 L57 13"/>
    <path d="M53 12 L57 12 L57 16"/>
  </g>

  <!-- Corpo do baú -->
  <path d="M8 36 L56 36 L52 56 L12 56 Z" fill="#c9a06a"/>
  <line x1="6" y1="36" x2="58" y2="36" stroke="#6f4e2e" stroke-width="1.2"/>

  <!-- Fechadura -->
  <rect x="29" y="44" width="6" height="6" rx="1.2" fill="#5a3a1f"/>
  <circle cx="32" cy="47" r="1" fill="#f4ead5"/>
</svg>
